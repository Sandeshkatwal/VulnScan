name: Feature request
description: Suggest a safe Public Beta improvement.
title: "[Feature]: "
labels: ["enhancement", "public-beta"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
    validations:
      required: true
  - type: textarea
    id: proposed_solution
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: textarea
    id: safety_considerations
    attributes:
      label: Safety considerations
      description: "Include authorised-use, redaction, and non-destructive behaviour notes."
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives
  - type: input
    id: module
    attributes:
      label: Module affected
