name: Performance Check

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  performance-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Generate Large Demo Dataset
        run: python scripts/generate_large_demo_dataset.py --findings 100 --evidence 200 --reports 10

      - name: Check Large Dataset Performance
        run: python scripts/check_large_dataset_performance.py

      - name: Pagination tests
        run: python -m pytest tests/test_pagination.py

      - name: Large Dataset regression tests
        run: python -m pytest tests/regression/test_large_dataset_regressions.py
