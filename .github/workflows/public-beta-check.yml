name: Public Beta Check

on:
  push:
  pull_request:

jobs:
  public-beta:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: python -m pip install -r requirements.txt
      - name: Demo safety
        run: python scripts/check_demo_safety.py
      - name: Secret safety
        run: python scripts/check_no_secrets.py
      - name: Release verification
        run: python scripts/verify_release.py
      - name: Public beta readiness
        run: python scripts/public_beta_check.py
